name: Build GCP Infrastructure
run-name: Build GCP Infrastructure
on:
  workflow_call:

jobs:
  build_infra:
    name: Build Infrastructure
    runs-on: [ubuntu-latest]
    env:
      TERRAFORM_VERSION: 1.7.5
      GCP_PROJECT_NUM: 390209572226
      GCP_PROJECT_ID: project-235e2136-7c2e-4409-bad
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.ref_name }}

    - name: Setup up Google Cloud Auth
      id: auth
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: "projects/${{ env.GCP_PROJECT_NUM }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
        service_account: "gh-gcp-runner-sa@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com"

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TERRAFORM_VERSION }}
        
    - name: Run Terraform
      run: |
        cd terraform
        terraform init
        
