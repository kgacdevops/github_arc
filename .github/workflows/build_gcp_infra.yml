name: Build GCP Infrastructure
run-name: Build GCP Infrastructure - ${{ github.event.inputs.ACTION }}
on:
  workflow_dispatch:
    inputs:
      ACTION:
        description: "Action"
        type: choice
        options:
        - plan
        - apply
        - destroy

permissions:
  id-token: write
  contents: read
  
jobs:
  build_infra:
    name: Build Infrastructure
    runs-on: [ubuntu-latest]
    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      TERRAFORM_VERSION: 1.7.5
      GCP_PROJECT_NUM: 390209572226
      GCP_PROJECT_ID: project-235e2136-7c2e-4409-bad
      SVC_ACCOUNT: terraform-gcp-sa
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      with:
        ref: ${{ github.ref_name }}

    - name: Setup up Google Cloud Auth
      id: auth
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: "projects/${{ env.GCP_PROJECT_NUM }}/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
        service_account: "${{ env.SVC_ACCOUNT }}@${{ env.GCP_PROJECT_ID }}.iam.gserviceaccount.com"

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TERRAFORM_VERSION }}
    
    - name: Export GH Token
      run: export TF_VAR_gh_token="${{ env.GH_TOKEN }}"
        
    - name: Run Terraform
      run: |
        cd terraform
        terraform init
        terraform plan
        if [[ "${{ inputs.ACTION }}" == "apply" ]]; then
          terraform apply -auto-approve
        elif [[ "${{ inputs.ACTION }}" == "destroy" ]]; then
          terraform destroy -auto-approve
        fi      
        
