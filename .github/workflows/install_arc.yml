name: Install ARC
run-name: install arc - ${{ github.event.inputs.ACTION }}
on:
  workflow_dispatch:
    inputs:
      CLOUD_PROVIDER:
        description: "Cloud Provider"
        type: choice
        options:
        - azure
        - gcp
        - aws
      REGION:
        description: "Region"
        type: string

jobs:
  install_arc:
    permissions:
      id-token: write
      contents: write
      repository-projects: write
      actions: write
    uses: kgacandole/cicd_arc/.github/workflows/build_arc_infra.yml@main
    secrets: inherit
    with:
      ACTION: 'skip'
      CLOUD_PROVIDER: ${{ github.event.inputs.CLOUD_PROVIDER }}
      RUN_INSTALL_ARC: 'true'
      REGION: ${{ github.event.inputs.REGION }}