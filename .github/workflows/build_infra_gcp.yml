name: Build GCP Infra
run-name: build gcp infra - ${{ github.event.inputs.ACTION }}
on:
  workflow_dispatch:
    inputs:
      ACTION:
        description: "Action"
        type: choice
        options:
        - plan
        - apply
        - destroy
      REGION:
        description: "Region"
        type: string
        default: 'us-central1-a'

jobs:
  build_gcp_infra:
    permissions:
      id-token: write
      contents: write
      repository-projects: write
      actions: write
    uses: kgacdevops/cicd_arc/.github/workflows/build_arc_infra.yml@main
    secrets: inherit
    with:
      ACTION: ${{ github.event.inputs.ACTION }}
      CLOUD_PROVIDER: 'gcp'
      REGION: ${{ github.event.inputs.REGION }}